<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pages/index.css">
    <title>Mesto</title>
</head>
<main>

    <body class="page">
        <header class="header">
            <div class="header__logo"></div>
        </header>
        <section class="profile">
            <img class="profile__avatar" src="./images/profile__avatar.png" alt="Изображение профиля">
            <div class="profile__info">
                <div class="profile__info-wrapper">
                    <h1 class="profile__title">Жак-Ив Кусто</h1>
                    <button type="button" class="profile__edit-btn"></button>
                </div>
                <p class="profile__subtitle">Исследователь океана</p>
            </div>
            <button type="button" class="profile__add-btn"></button>
        </section>
        <section class="elements-container">
            <ul class="elements">
                <li class="elements__card">
                    <img class="elements__image" src="./images/karachaevsk.png" alt="Карачаевск">
                    <div class="elements__title-wrapper">
                        <h2 class="elements__title">Карачаевск</h2>
                        <button type="button" class="elements__like-btn"></button>
                    </div>
                </li>
                <li class="elements__card">
                    <img class="elements__image" src="./images/elbrus.png" alt="Гора Эльбрус">
                    <div class="elements__title-wrapper">
                        <h2 class="elements__title">Гора Эльбрус</h2>
                        <button type="button" class="elements__like-btn"></button>
                    </div>
                </li>
                <li class="elements__card">
                    <img class="elements__image" src="./images/dombai.png" alt="Домбай">
                    <div class="elements__title-wrapper">
                        <h2 class="elements__title">Домбай</h2>
                        <button type="button" class="elements__like-btn"></button>
                    </div>
                </li>
                <li class="elements__card">
                    <img class="elements__image" src="./images/elbrus.png" alt="Гора Эльбрус">
                    <div class="elements__title-wrapper">
                        <h2 class="elements__title">Гора Эльбрус</h2>
                        <button type="button" class="elements__like-btn"></button>
                    </div>
                </li>
                <li class="elements__card">
                    <img class="elements__image" src="./images/dombai.png" alt="Гора Эльбрус">
                    <div class="elements__title-wrapper">
                        <h2 class="elements__title">Домбай</h2>
                        <button type="button" class="elements__like-btn"></button>
                    </div>
                </li>
                <li class="elements__card">
                    <img class="elements__image" src="./images/karachaevsk.png" alt="Карачаево-Черкесская">
                    <div class="elements__title-wrapper">
                        <h2 class="elements__title">Карачаево-Черкесская</h2>
                        <button type="button" class="elements__like-btn"></button>
                    </div>
                </li>
            </ul>
        </section>
        <footer class="footer">
            <p class="footer__copyrights">&copy; 2021 Mesto Russia</p>
        </footer>
</main>
<div data-type="edit-popup" class="popup">
    <div class="popup__container">
        <button type="button" class="popup__close"></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form class="popup__form" name="fpopup" method="post">
            <input type="text" id="input-name" name="input-name" class="popup__item popup__item_type_name"
                placeholder="Введите ваше имя" required>
            <input type="text" id="input-about" name="input-about" class="popup__item popup__item_type_about"
                placeholder="Добавьте описание" required>
            <button type="submit" class="popup__save-btn">Сохранить</button>
        </form>
    </div>
</div>
<script defer src="scripts/index.js"></script>
</body>

</html>
